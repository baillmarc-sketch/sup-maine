  </g>
  <!-- rocky base -->
  <path d="M150 372 Q200 348 256 360 Q312 348 362 372 L362 392 L150 392 Z" fill="#6f655b"/>
  <!-- waves -->
  <g fill="none" stroke="#2f6b4f" stroke-width="12" stroke-linecap="round" opacity="0.9">
    <path d="M120 408 q28 -22 56 0 t56 0 t56 0 t56 0"/>
    <path d="M120 444 q28 -22 56 0 t56 0 t56 0 t56 0" stroke="#2b4a6f"/>
  </g>
